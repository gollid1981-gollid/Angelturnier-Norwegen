:root {
  --water: #0a1628;
  --deep: #061020;
  --surface: #0f2040;
  --card: #112238;
  --border: #1e3a5f;
  --gold: #d4a234;
  --gold-light: #f0c060;
  --silver: #8ba3b8;
  --bronze: #b87040;
  --accent: #2e8bc0;
  --green: #2eb87a;
  --text: #e8f4f8;
  --muted: #6a8fa8;
}

body {
  font-family: 'Source Sans 3', sans-serif;
  background: var(--deep);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Animated water background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 120% 60% at 20% 80%, rgba(14,50,90,0.6) 0%, transparent 70%),
    radial-gradient(ellipse 80% 40% at 80% 20%, rgba(10,30,60,0.8) 0%, transparent 60%),
    linear-gradient(180deg, #061020 0%, #0a1628 40%, #0d1e38 100%);
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 200px;
  background: repeating-linear-gradient(
    90deg,
    transparent 0px, transparent 8px,
    rgba(46,139,192,0.04) 8px, rgba(46,139,192,0.04) 16px
  );
  animation: ripple 6s linear infinite;
  z-index: 0;
}

@keyframes ripple {
  0% { transform: translateX(0); }
  100% { transform: translateX(16px); }
}

.wrapper {
  position: relative;
  z-index: 1;
  max-width: 960px;
  margin: 0 auto;
  padding: 32px 20px 80px;
}

/* HEADER */
header {
  text-align: center;
  margin-bottom: 48px;
  animation: fadeDown 0.7s ease;
}

@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}

.logo {
  font-size: 52px;
  display: block;
  margin-bottom: 8px;
  filter: drop-shadow(0 0 16px rgba(212,162,52,0.5));
  animation: bobbing 3s ease-in-out infinite;
}

@keyframes bobbing {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(32px, 6vw, 56px);
  font-weight: 900;
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -1px;
  line-height: 1;
  margin-bottom: 8px;
}

.subtitle {
  color: var(--muted);
  font-size: 14px;
  letter-spacing: 4px;
  text-transform: uppercase;
}

/* NAV TABS */
.tabs {
  display: flex;
  gap: 4px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 6px;
  margin-bottom: 32px;
}

.tab-btn {
  flex: 1;
  padding: 10px 16px;
  border: none;
  border-radius: 10px;
  background: transparent;
  color: var(--muted);
  font-family: 'Source Sans 3', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.25s;
  letter-spacing: 0.5px;
}

.tab-btn:hover { color: var(--text); background: rgba(255,255,255,0.05); }

.tab-btn.active {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 4px 16px rgba(46,139,192,0.4);
}

/* PANELS */
.panel { display: none; animation: fadeIn 0.3s ease; }
.panel.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* CARDS */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  margin-bottom: 20px;
}

.card-title {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  color: var(--gold);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}

/* FORM ELEMENTS */
.form-row {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex: 1;
  min-width: 160px;
}

label {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
}

input, select {
  background: #1a3a5c;
  border: 1px solid #2e5f8a;
  border-radius: 10px;
  color: #ffffff;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 15px;
  padding: 10px 14px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

input:focus, select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(46,139,192,0.2);
}

input::placeholder { color: var(--muted); }

select option { background: var(--surface); }

.btn {
  padding: 11px 22px;
  border: none;
  border-radius: 10px;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.5px;
  white-space: nowrap;
}

.btn-primary {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 4px 14px rgba(46,139,192,0.3);
}

.btn-primary:hover {
  background: #3a9fd4;
  transform: translateY(-1px);
  box-shadow: 0 6px 18px rgba(46,139,192,0.5);
}

.btn-gold {
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  color: #1a0e00;
}

.btn-gold:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 18px rgba(212,162,52,0.4);
}

.btn-danger {
  background: rgba(200,60,60,0.15);
  color: #e07070;
  border: 1px solid rgba(200,60,60,0.3);
  padding: 6px 12px;
  font-size: 12px;
}

.btn-danger:hover { background: rgba(200,60,60,0.3); }

.btn-sm {
  padding: 7px 14px;
  font-size: 13px;
}

/* PARTICIPANTS LIST */
.participants-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
}

.participant-chip {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  gap: 8px;
  animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
}

@keyframes popIn {
  from { opacity: 0; transform: scale(0.85); }
  to { opacity: 1; transform: scale(1); }
}

.participant-chip .avatar {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 13px;
  flex-shrink: 0;
}

.participant-chip .name {
  flex: 1;
  font-size: 14px;
  font-weight: 600;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* FISH SPECIES */
.species-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.species-tag {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 7px 14px;
  font-size: 13px;
  animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
}

.species-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* CATCH ENTRY */
.catch-log {
  margin-top: 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.catch-item {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  animation: slideIn 0.3s ease;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(-10px); }
  to { opacity: 1; transform: translateX(0); }
}

.catch-item .ci-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
}

.catch-item .ci-info {
  flex: 1;
  min-width: 0;
}

.catch-item .ci-main {
  font-size: 14px;
  font-weight: 600;
}

.catch-item .ci-sub {
  font-size: 12px;
  color: var(--muted);
}

.catch-item .ci-length {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--accent);
  white-space: nowrap;
}

/* RANKING */
.ranking-section { margin-bottom: 32px; }

.ranking-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}

.species-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 14px;
  font-weight: 600;
}

.ranking-table {
  width: 100%;
  border-collapse: collapse;
}

.ranking-table thead tr {
  border-bottom: 1px solid var(--border);
}

.ranking-table th {
  padding: 10px 14px;
  font-size: 11px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  text-align: left;
  font-weight: 600;
}

.ranking-table th:last-child { text-align: right; }

.ranking-table td {
  padding: 12px 14px;
  font-size: 14px;
  border-bottom: 1px solid rgba(30,58,95,0.5);
}

.ranking-table td:last-child { text-align: right; }

.rank-pos {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  font-size: 14px;
  font-family: 'Playfair Display', serif;
}

.rank-1 { background: linear-gradient(135deg, #c8960a, #f0c060); color: #1a0e00; box-shadow: 0 0 16px rgba(212,162,52,0.5); }
.rank-2 { background: linear-gradient(135deg, #6a8090, #a8c0d0); color: #0a1628; }
.rank-3 { background: linear-gradient(135deg, #8a4a20, #c07040); color: #fff; }
.rank-other { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }

.angler-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.mini-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
}

.length-display {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 700;
}

.length-sub {
  font-size: 11px;
  color: var(--muted);
}

.empty-state {
  text-align: center;
  padding: 48px 20px;
  color: var(--muted);
}

.empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
.empty-state p { font-size: 15px; }

.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--green);
  color: #fff;
  padding: 12px 24px;
  border-radius: 24px;
  font-size: 14px;
  font-weight: 600;
  z-index: 999;
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  white-space: nowrap;
  box-shadow: 0 8px 24px rgba(46,184,122,0.4);
}

.toast.show { transform: translateX(-50%) translateY(0); }

.divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 20px 0;
}

.stat-chips {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}

.stat-chip {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 16px;
  text-align: center;
  flex: 1;
  min-width: 100px;
}

.stat-chip .val {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  font-weight: 700;
  color: var(--gold);
  line-height: 1;
}

.stat-chip .lbl {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-top: 4px;
}

@media (max-width: 520px) {
  .form-row { flex-direction: column; }
  .tabs { gap: 2px; }
  .tab-btn { padding: 9px 8px; font-size: 12px; }
}

<script>
  // ─── State ────────────────────────────────────────────────────────────────
  const state = {
    participants: [],  // {id, name, color}
    species: [],       // {id, name, color}
    catches: []        // {id, participantId, speciesId, length, ts}
  };

  const COLORS = [
    '#2e8bc0','#d4a234','#2eb87a','#e05c5c','#9b72cf',
    '#e08030','#40bfb0','#d0609a','#8aaa30','#5090e0'
  ];

  let colorIdx = 0;
  function nextColor() { return COLORS[colorIdx++ % COLORS.length]; }

  // ─── Helpers ──────────────────────────────────────────────────────────────
  function uid() { return Math.random().toString(36).slice(2, 9); }

  function initials(name) {
    return name.trim().split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0, 2);
  }

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2400);
  }

  // ─── Tabs ─────────────────────────────────────────────────────────────────
  function showTab(id) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + id).classList.add('active');
    event.currentTarget.classList.add('active');
    if (id === 'catch') refreshSelects();
    if (id === 'ranking') renderRanking();
  }

  // ─── Participants ─────────────────────────────────────────────────────────
  function addParticipant() {
    const inp = document.getElementById('inp-name');
    const name = inp.value.trim();
    if (!name) return;
    if (state.participants.find(p => p.name.toLowerCase() === name.toLowerCase())) {
      toast('Teilnehmer existiert bereits!'); return;
    }
    state.participants.push({ id: uid(), name, color: nextColor() });
    inp.value = '';
    renderParticipants();
    toast('✓ ' + name + ' hinzugefügt');
  }

  function removeParticipant(id) {
    state.participants = state.participants.filter(p => p.id !== id);
    state.catches = state.catches.filter(c => c.participantId !== id);
    renderParticipants();
  }

  function renderParticipants() {
    const el = document.getElementById('participants-list');
    if (!state.participants.length) {
      el.innerHTML = `<div class="empty-state" style="grid-column:1/-1;padding:20px;"><div class="empty-icon">👥</div><p>Noch keine Teilnehmer</p></div>`;
      return;
    }
    el.innerHTML = state.participants.map(p => `
      <div class="participant-chip">
        <div class="avatar" style="background:${p.color}22;color:${p.color};border:1.5px solid ${p.color}44">${initials(p.name)}</div>
        <span class="name">${p.name}</span>
        <button class="btn btn-danger" onclick="removeParticipant('${p.id}')">✕</button>
      </div>
    `).join('');
  }

  // ─── Species ──────────────────────────────────────────────────────────────
  function addSpecies() {
    const inp = document.getElementById('inp-species');
    const name = inp.value.trim();
    if (!name) return;
    if (state.species.find(s => s.name.toLowerCase() === name.toLowerCase())) {
      toast('Fischart existiert bereits!'); return;
    }
    state.species.push({ id: uid(), name, color: COLORS[(state.species.length + 3) % COLORS.length] });
    inp.value = '';
    renderSpecies();
    toast('✓ ' + name + ' hinzugefügt');
  }

  function removeSpecies(id) {
    state.species = state.species.filter(s => s.id !== id);
    state.catches = state.catches.filter(c => c.speciesId !== id);
    renderSpecies();
  }

  function renderSpecies() {
    const el = document.getElementById('species-list');
    if (!state.species.length) {
      el.innerHTML = `<div class="empty-state" style="width:100%;padding:20px;"><div class="empty-icon">🐟</div><p>Noch keine Fischsorten</p></div>`;
      return;
    }
    el.innerHTML = state.species.map(s => `
      <div class="species-tag">
        <div class="species-dot" style="background:${s.color}"></div>
        ${s.name}
        <button class="btn btn-danger" onclick="removeSpecies('${s.id}')" style="padding:3px 8px;">✕</button>
      </div>
    `).join('');
  }

  // ─── Catch ────────────────────────────────────────────────────────────────
  function refreshSelects() {
    const sa = document.getElementById('sel-angler');
    const ss = document.getElementById('sel-species');
    const prevA = sa.value, prevS = ss.value;

    sa.innerHTML = '<option value="">— Angler wählen —</option>' +
      state.participants.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
    ss.innerHTML = '<option value="">— Fischart wählen —</option>' +
      state.species.map(s => `<option value="${s.id}">${s.name}</option>`).join('');

    if (prevA) sa.value = prevA;
    if (prevS) ss.value = prevS;
  }

  function addCatch() {
    const angId = document.getElementById('sel-angler').value;
    const spId = document.getElementById('sel-species').value;
    const len = parseFloat(document.getElementById('inp-length').value);

    if (!angId) { toast('Bitte Angler wählen'); return; }
    if (!spId) { toast('Bitte Fischart wählen'); return; }
    if (!len || len <= 0) { toast('Bitte gültige Länge eintragen'); return; }

    state.catches.push({ id: uid(), participantId: angId, speciesId: spId, length: len, ts: Date.now() });
    document.getElementById('inp-length').value = '';
    renderCatchLog();
    toast('🐟 Fang eingetragen!');
  }

  function removeCatch(id) {
    state.catches = state.catches.filter(c => c.id !== id);
    renderCatchLog();
  }

  function renderCatchLog() {
    const el = document.getElementById('catch-log');
    const cnt = document.getElementById('catch-count');
    cnt.textContent = state.catches.length ? state.catches.length + ' Einträge' : '';

    if (!state.catches.length) {
      el.innerHTML = `<div class="empty-state"><div class="empty-icon">🎣</div><p>Noch keine Fänge eingetragen</p></div>`;
      return;
    }

    const sorted = [...state.catches].sort((a, b) => b.ts - a.ts);
    el.innerHTML = sorted.map(c => {
      const p = state.participants.find(x => x.id === c.participantId);
      const s = state.species.find(x => x.id === c.speciesId);
      if (!p || !s) return '';
      return `
        <div class="catch-item">
          <div class="ci-avatar" style="background:${p.color}22;color:${p.color};border:1.5px solid ${p.color}44">${initials(p.name)}</div>
          <div class="ci-info">
            <div class="ci-main">${p.name}</div>
            <div class="ci-sub"><span style="color:${s.color}">●</span> ${s.name}</div>
          </div>
          <div class="ci-length">${c.length} cm</div>
          <button class="btn btn-danger" onclick="removeCatch('${c.id}')">✕</button>
        </div>
      `;
    }).join('');
  }

  // ─── Ranking ──────────────────────────────────────────────────────────────
  function renderRanking() {
    // Stats
    const sc = document.getElementById('stat-chips');
    const totalFish = state.catches.length;
    const maxLen = totalFish ? Math.max(...state.catches.map(c => c.length)) : 0;
    const leaders = new Set(state.catches.map(c => c.participantId)).size;
    sc.innerHTML = `
      <div class="stat-chip"><div class="val">${state.participants.length}</div><div class="lbl">Angler</div></div>
      <div class="stat-chip"><div class="val">${totalFish}</div><div class="lbl">Fänge</div></div>
      <div class="stat-chip"><div class="val">${maxLen > 0 ? maxLen + ' cm' : '—'}</div><div class="lbl">Längster Fisch</div></div>
      <div class="stat-chip"><div class="val">${state.species.length}</div><div class="lbl">Fischarten</div></div>
    `;

    const el = document.getElementById('ranking-content');
    if (!state.catches.length || !state.species.length) {
      el.innerHTML = `<div class="empty-state" style="padding:60px 20px;"><div class="empty-icon">🏆</div><p>Noch keine Daten für die Rangliste</p></div>`;
      return;
    }

    // Build ranking per species
    let html = '';
    state.species.forEach(sp => {
      const spCatches = state.catches.filter(c => c.speciesId === sp.id);
      if (!spCatches.length) return;

      // Aggregate: sum of lengths per participant
      const agg = {};
      spCatches.forEach(c => {
        if (!agg[c.participantId]) agg[c.participantId] = { total: 0, count: 0 };
        agg[c.participantId].total += c.length;
        agg[c.participantId].count++;
      });

      const rows = Object.entries(agg)
        .map(([pid, d]) => ({ pid, ...d }))
        .sort((a, b) => b.total - a.total);

      const rankClasses = ['rank-1', 'rank-2', 'rank-3'];

      html += `
        <div class="ranking-section">
          <div class="ranking-header">
            <div class="species-badge">
              <div class="species-dot" style="background:${sp.color}"></div>
              ${sp.name}
            </div>
            <span style="color:var(--muted);font-size:13px">${spCatches.length} Fang${spCatches.length !== 1 ? 'e' : ''}</span>
          </div>
          <div class="card" style="padding:0;overflow:hidden;">
            <table class="ranking-table">
              <thead>
                <tr>
                  <th style="width:56px">Platz</th>
                  <th>Angler</th>
                  <th>Fänge</th>
                  <th>Gesamtlänge</th>
                </tr>
              </thead>
              <tbody>
                ${rows.map((r, i) => {
                  const p = state.participants.find(x => x.id === r.pid);
                  if (!p) return '';
                  const rankClass = i < 3 ? rankClasses[i] : 'rank-other';
                  const isFirst = i === 0;
                  return `
                    <tr>
                      <td><div class="rank-pos ${rankClass}">${i + 1}</div></td>
                      <td>
                        <div class="angler-row">
                          <div class="mini-avatar" style="background:${p.color}22;color:${p.color};border:1.5px solid ${p.color}44">${initials(p.name)}</div>
                          <span style="font-weight:600;${isFirst ? 'color:var(--gold-light)' : ''}">${p.name}</span>
                          ${isFirst ? '<span style="font-size:16px;margin-left:4px">🏆</span>' : ''}
                        </div>
                      </td>
                      <td style="color:var(--muted)">${r.count}×</td>
                      <td>
                        <div class="length-display" style="color:${isFirst ? 'var(--gold)' : 'var(--accent)'}">${r.total.toFixed(1)} cm</div>
                        <div class="length-sub">Ø ${(r.total / r.count).toFixed(1)} cm</div>
                      </td>
                    </tr>
                  `;
                }).join('')}
              </tbody>
            </table>
          </div>
        </div>
      `;
    });

    // Overall ranking (total across all species)
    if (state.species.length > 1) {
      const overall = {};
      state.catches.forEach(c => {
        if (!overall[c.participantId]) overall[c.participantId] = 0;
        overall[c.participantId] += c.length;
      });

      const overallRows = Object.entries(overall)
        .map(([pid, total]) => ({ pid, total }))
        .sort((a, b) => b.total - a.total);

      const rankClasses = ['rank-1', 'rank-2', 'rank-3'];

      html += `
        <div class="ranking-section">
          <div class="ranking-header">
            <div class="species-badge">🏅 Gesamtwertung</div>
            <span style="color:var(--muted);font-size:13px">Alle Fischarten</span>
          </div>
          <div class="card" style="padding:0;overflow:hidden;">
            <table class="ranking-table">
              <thead>
                <tr>
                  <th style="width:56px">Platz</th>
                  <th>Angler</th>
                  <th>Gesamtlänge</th>
                </tr>
              </thead>
              <tbody>
                ${overallRows.map((r, i) => {
                  const p = state.participants.find(x => x.id === r.pid);
                  if (!p) return '';
                  const rankClass = i < 3 ? rankClasses[i] : 'rank-other';
                  return `
                    <tr>
                      <td><div class="rank-pos ${rankClass}">${i + 1}</div></td>
                      <td>
                        <div class="angler-row">
                          <div class="mini-avatar" style="background:${p.color}22;color:${p.color};border:1.5px solid ${p.color}44">${initials(p.name)}</div>
                          <span style="font-weight:600;${i === 0 ? 'color:var(--gold-light)' : ''}">${p.name}</span>
                          ${i === 0 ? '<span style="font-size:16px;margin-left:4px">👑</span>' : ''}
                        </div>
                      </td>
                      <td>
                        <div class="length-display" style="color:${i === 0 ? 'var(--gold)' : 'var(--accent)'}">${r.total.toFixed(1)} cm</div>
                      </td>
                    </tr>
                  `;
                }).join('')}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    el.innerHTML = html || `<div class="empty-state" style="padding:40px;"><div class="empty-icon">🐟</div><p>Keine Fänge für verfügbare Fischarten</p></div>`;
  }

  // ─── Enter key support ────────────────────────────────────────────────────
  document.getElementById('inp-name').addEventListener('keydown', e => { if (e.key === 'Enter') addParticipant(); });
  document.getElementById('inp-species').addEventListener('keydown', e => { if (e.key === 'Enter') addSpecies(); });
  document.getElementById('inp-length').addEventListener('keydown', e => { if (e.key === 'Enter') addCatch(); });
</script>

</body>
</html>
