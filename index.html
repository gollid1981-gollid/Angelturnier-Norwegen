:root {
  --water: #7fa6c7;
  --deep: #040b16;
  --surface: #132844;
  --surface-strong: #183459;
  --card: #10233b;
  --card-soft: #152d4b;
  --border: #2a4c74;
  --gold: #c49a57;
  --gold-light: #d8ae69;
  --silver: #8ba3b8;
  --bronze: #b87040;
  --accent: #3aa0f3;
  --accent-strong: #1f7fe5;
  --green: #4f9f83;
  --text: #f5fbff;
  --text-strong: #ffffff;
  --muted: #b6cbe0;
  --danger: #ff8f8f;
  --danger-bg: rgba(220, 74, 74, 0.18);
  --icon-bg: rgba(78,180,241,0.14);
  --icon-border: rgba(121,204,255,0.4);
  --shadow-soft: 0 10px 30px rgba(3, 11, 24, 0.35);
}

body {
  font-family: 'Source Sans 3', sans-serif;
  background: linear-gradient(180deg, #f9f6f1 0%, #f2ede5 100%);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Animated water background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 120% 60% at 20% 80%, rgba(182,138,61,0.10) 0%, transparent 70%),
    radial-gradient(ellipse 80% 40% at 80% 20%, rgba(111,143,168,0.10) 0%, transparent 60%),
    linear-gradient(180deg, #fbf8f3 0%, #f2ede5 48%, #ece2d6 100%);
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 200px;
  background: repeating-linear-gradient(
    90deg,
    transparent 0px, transparent 8px,
    rgba(182,138,61,0.07) 8px, rgba(182,138,61,0.07) 16px
  );
  animation: ripple 6s linear infinite;
  z-index: 0;
}

@keyframes ripple {
  0% { transform: translateX(0); }
  100% { transform: translateX(16px); }
}

.wrapper {
  position: relative;
  z-index: 1;
  max-width: 960px;
  margin: 0 auto;
  padding: 32px 20px 80px;
}

/* HEADER */
header {
  text-align: center;
  margin-bottom: 48px;
  animation: fadeDown 0.7s ease;
}

@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}

.logo {
  font-size: 52px;
  display: block;
  margin-bottom: 8px;
  filter: drop-shadow(0 0 16px rgba(212,162,52,0.5));
  animation: bobbing 3s ease-in-out infinite;
}

@keyframes bobbing {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(32px, 6vw, 56px);
  font-weight: 900;
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -1px;
  line-height: 1;
  margin-bottom: 8px;
}

.subtitle {
  color: var(--muted);
  font-size: 14px;
  letter-spacing: 3px;
  text-transform: uppercase;
  font-weight: 600;
}

/* NAV TABS */
.tabs {
  display: flex;
  gap: 4px;
  background: rgba(255, 253, 249, 0.94) !important;
  border: 1px solid #e4d8c8 !important;
  border-radius: 16px;
  padding: 6px;
  margin-bottom: 28px;
  box-shadow: 0 10px 24px rgba(74,54,34,0.06);
}

.tab-btn {
  flex: 1;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 10px 16px;
  border: none;
  border-radius: 12px;
  background: transparent;
  color: #6f6254 !important;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.25s ease;
  letter-spacing: 0.2px;
  min-height: 46px;
}

.tab-btn:hover {
  color: #2f241a !important;
  background: rgba(34, 123, 255, 0.10);
}

.tab-icon {
  width: 32px;
  height: 32px;
  border-radius: 10px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: #f2ede6;
  color: #7f7468;
  box-shadow: inset 0 0 0 1px rgba(111,98,84,0.08);
  transition: all 0.25s ease;
  flex-shrink: 0;
}

.tab-label {
  line-height: 1;
  white-space: nowrap;
}

.tab-btn.active {
  background: linear-gradient(135deg, rgba(34,123,255,0.18) 0%, rgba(9,92,214,0.24) 100%);
  color: #0a3f8f !important;
  box-shadow: 0 10px 24px rgba(34,123,255,0.24);
}

.tab-btn.active .tab-icon {
  background: linear-gradient(135deg, #2f80ff 0%, #0f5fe0 100%);
  color: #ffffff;
  box-shadow: 0 10px 22px rgba(34,123,255,0.38);
}

.tab-btn:focus-visible {
  outline: 3px solid rgba(34,123,255,0.30);
  outline-offset: 2px;
}

/* PANELS */
.panel { display: none; animation: fadeIn 0.3s ease; }
.panel.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* CARDS */
.card {
  background: linear-gradient(180deg, rgba(21,45,75,0.95) 0%, rgba(16,35,59,0.98) 100%);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 28px;
  margin-bottom: 20px;
  box-shadow: var(--shadow-soft);
}

.card-title {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  color: var(--gold);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}


.logo,
.card-title,
.empty-icon,
.species-badge,
.rank-pos {
  text-shadow: 0 0 16px rgba(246, 207, 118, 0.2);
}

.card-title,
.species-badge {
  color: var(--text-strong);
}

.card-title,
.species-badge,
.tab-btn,
.btn,
.empty-icon {
  -webkit-tap-highlight-color: transparent;
}

.card-title > :first-child,
.species-badge > :first-child,
.ranking-header > .species-badge,
.empty-icon,
.logo {
  position: relative;
}

.card-title::before,
.species-badge::before {
  content: '';
  width: 34px;
  height: 34px;
  border-radius: 12px;
  background: var(--icon-bg);
  border: 1px solid var(--icon-border);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 8px 18px rgba(4,17,31,0.28);
  position: absolute;
  transform: translateY(-1px);
}

.card-title,
.species-badge {
  position: relative;
  padding-left: 44px;
  min-height: 34px;
}

.card-title::after,
.species-badge::after {
  content: '';
  position: absolute;
  left: 11px;
  top: 50%;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--gold-light) 0%, var(--gold) 70%, rgba(212,162,52,0.2) 100%);
  transform: translateY(-50%);
  box-shadow: 0 0 14px rgba(246, 207, 118, 0.55);
}

.participant-chip,
.species-tag,
.catch-item,
.stat-chip,
.ranking-table tbody tr {
  background: rgba(19,40,68,0.9);
}

.participant-chip,
.species-tag,
.catch-item {
  border-radius: 14px;
}

.participant-chip .name,
.catch-item .ci-main,
.ranking-table td,
.species-tag,
.length-sub,
.catch-item .ci-sub {
  color: var(--text);
}

.catch-item .ci-sub,
.length-sub,
.ranking-table th,
label,
.subtitle,
.stat-chip .lbl {
  color: var(--muted);
}

.tab-btn,
.btn,
input,
select {
  min-height: 46px;
}

.tab-btn {
  font-size: 15px;
}

.btn {
  font-size: 15px;
}

.participant-chip .avatar,
.catch-item .ci-avatar,
.mini-avatar {
  box-shadow: 0 6px 14px rgba(4,17,31,0.22);
}

/* FORM ELEMENTS */
.form-row {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex: 1;
  min-width: 160px;
}

label {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
}

input, select {
  background: rgba(8, 25, 43, 0.9);
  border: 1px solid #4777a5;
  border-radius: 12px;
  color: var(--text-strong);
  font-family: 'Source Sans 3', sans-serif;
  font-size: 16px;
  padding: 13px 14px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}

input:focus, select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(46,139,192,0.2);
}

input::placeholder { color: #9eb7cc; }

select option { background: #fffdfa; color: #2f241a; }

.btn {
  padding: 11px 22px;
  border: none;
  border-radius: 10px;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.5px;
  white-space: nowrap;
}

.btn-primary {
  background: linear-gradient(135deg, #c8a15f 0%, #c49a57 55%, #b98a45 100%);
  color: #fffdf9;
  box-shadow: 0 10px 22px rgba(196,154,87,0.26);
  border-radius: 18px;
}

.btn-primary:hover {
  background: linear-gradient(135deg, #d0aa6a 0%, #c89d58 55%, #bd8f4b 100%);
  transform: translateY(-1px);
  box-shadow: 0 12px 26px rgba(196,154,87,0.32);
}

.btn-gold {
  background: linear-gradient(135deg, #c8a15f 0%, #c49a57 55%, #b98a45 100%);
  color: #fffdf9;
  box-shadow: 0 10px 24px rgba(196,154,87,0.28);
  border-radius: 18px;
}

.btn-gold:hover {
  background: linear-gradient(135deg, #d0aa6a 0%, #c89d58 55%, #bd8f4b 100%);
  transform: translateY(-1px);
  box-shadow: 0 12px 28px rgba(196,154,87,0.34);
}

.btn-danger {
  background: var(--danger-bg);
  color: var(--danger);
  border: 1px solid rgba(255,143,143,0.32);
  padding: 8px 12px;
  font-size: 12px;
}

.btn-danger:hover { background: rgba(200,60,60,0.3); }

.btn-sm {
  padding: 7px 14px;
  font-size: 13px;
}

/* PARTICIPANTS LIST */
.participants-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
}

.participant-chip {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  gap: 8px;
  animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
}

@keyframes popIn {
  from { opacity: 0; transform: scale(0.85); }
  to { opacity: 1; transform: scale(1); }
}

.participant-chip .avatar {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 13px;
  flex-shrink: 0;
}

.participant-chip .name {
  flex: 1;
  font-size: 14px;
  font-weight: 600;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* FISH SPECIES */
.species-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.species-tag {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 7px 14px;
  font-size: 13px;
  animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
}

.species-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* CATCH ENTRY */
.catch-log {
  margin-top: 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.catch-item {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  animation: slideIn 0.3s ease;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(-10px); }
  to { opacity: 1; transform: translateX(0); }
}

.catch-item .ci-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
}

.catch-item .ci-info {
  flex: 1;
  min-width: 0;
}

.catch-item .ci-main {
  font-size: 14px;
  font-weight: 600;
}

.catch-item .ci-sub {
  font-size: 12px;
  color: var(--muted);
}

.catch-item .ci-length {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--accent);
  white-space: nowrap;
}

/* RANKING */
.ranking-section { margin-bottom: 32px; }

.ranking-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}

.species-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
}

.ranking-table {
  width: 100%;
  border-collapse: collapse;
}

.ranking-table thead tr {
  border-bottom: 1px solid var(--border);
}

.ranking-table th {
  padding: 10px 14px;
  font-size: 11px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  text-align: left;
  font-weight: 600;
}

.ranking-table th:last-child { text-align: right; }

.ranking-table td {
  padding: 12px 14px;

}

.ranking-table td:last-child { text-align: right; }

.rank-pos {

.rank-1 { background: linear-gradient(135deg, #c7a15a, #b68a3d); color: #fffdf9; box-shadow: 0 0 16px rgba(182,138,61,0.28); text-shadow: 0 1px 2px rgba(0,0,0,0.14); }

.angler-row {

}

.empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }

.toast {

  padding: 12px 24px;

.divider {

<script>
  // ─── State ────────────────────────────────────────────────────────────────
  const state = {
    participants: [],  // {id, name, color}
    species: [],       // {id, name, color}
    catches: []        // {id, participantId, speciesId, length, ts}
  };

  const STORAGE_KEY = 'angelturnier_state_v1';

  const COLORS = [
    '#2e8bc0','#d4a234','#2eb87a','#e05c5c','#9b72cf',
    '#e08030','#40bfb0','#d0609a','#8aaa30','#5090e0'
  ];

  let colorIdx = 0;
  function nextColor() { return COLORS[colorIdx++ % COLORS.length]; }

  // ─── Helpers ──────────────────────────────────────────────────────────────
  function uid() { return Math.random().toString(36).slice(2, 9); }

  function initials(name) {
    return name.trim().split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0, 2);
  }

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2400);
  }

  function saveState() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (err) {
      console.warn('Speichern fehlgeschlagen', err);
    }
  }

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return;
      const saved = JSON.parse(raw);
      state.participants = Array.isArray(saved.participants) ? saved.participants : [];
      state.species = Array.isArray(saved.species) ? saved.species : [];
      state.catches = Array.isArray(saved.catches) ? saved.catches : [];
      colorIdx = state.participants.length + state.species.length + state.catches.length;
    } catch (err) {
      console.warn('Laden fehlgeschlagen', err);
    }
  }

  function renderAll() {
    renderParticipants();
    renderSpecies();
    refreshSelects();
    renderCatchLog();
    renderRanking();
  }


  // ─── Tabs ─────────────────────────────────────────────────────────────────
  function showTab(id) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + id).classList.add('active');
    event.currentTarget.classList.add('active');
    if (id === 'catch') refreshSelects();
    if (id === 'ranking') renderRanking();
  }

  // ─── Participants ─────────────────────────────────────────────────────────
  function addParticipant() {
    const inp = document.getElementById('inp-name');
    const name = inp.value.trim();
    if (!name) return;
    if (state.participants.find(p => p.name.toLowerCase() === name.toLowerCase())) {
      toast('Teilnehmer existiert bereits!'); return;
    }
    state.participants.push({ id: uid(), name, color: nextColor() });
    inp.value = '';
    renderParticipants();
    saveState();
    toast('✓ ' + name + ' hinzugefügt');
  }

  function removeParticipant(id) {
    state.participants = state.participants.filter(p => p.id !== id);
    state.catches = state.catches.filter(c => c.participantId !== id);
    renderParticipants();
    refreshSelects();
    renderCatchLog();
    renderRanking();
    saveState();
  }

  function renderParticipants() {
    const el = document.getElementById('participants-list');
    if (!state.participants.length) {
      el.innerHTML = `<div class="empty-state" style="grid-column:1/-1;padding:20px;"><div class="empty-icon">👥</div><p>Noch keine Teilnehmer</p></div>`;
      return;
    }
    el.innerHTML = state.participants.map(p => `
      <div class="participant-chip">
        <div class="avatar" style="background:${p.color}22;color:${p.color};border:1.5px solid ${p.color}44">${initials(p.name)}</div>
        <span class="name">${p.name}</span>
        <button class="btn btn-danger" onclick="removeParticipant('${p.id}')">✕</button>
      </div>
    `).join('');
  }

  // ─── Species ──────────────────────────────────────────────────────────────
  function addSpecies() {
    const inp = document.getElementById('inp-species');
    const name = inp.value.trim();
    if (!name) return;
    if (state.species.find(s => s.name.toLowerCase() === name.toLowerCase())) {
      toast('Fischart existiert bereits!'); return;
    }
    state.species.push({ id: uid(), name, color: COLORS[(state.species.length + 3) % COLORS.length] });
    inp.value = '';
    renderSpecies();
    saveState();
    toast('✓ ' + name + ' hinzugefügt');
  }

  function removeSpecies(id) {
    state.species = state.species.filter(s => s.id !== id);
    state.catches = state.catches.filter(c => c.speciesId !== id);
    renderSpecies();
    refreshSelects();
    renderCatchLog();
    renderRanking();
    saveState();
  }

  function renderSpecies() {
    const el = document.getElementById('species-list');
    if (!state.species.length) {
      el.innerHTML = `<div class="empty-state" style="width:100%;padding:20px;"><div class="empty-icon">🐟</div><p>Noch keine Fischarten</p></div>`;
      return;
    }
    el.innerHTML = state.species.map(s => `
      <div class="species-tag">
        <div class="species-dot" style="background:${s.color}"></div>
        ${s.name}
        <button class="btn btn-danger" onclick="removeSpecies('${s.id}')" style="padding:3px 8px;">✕</button>
      </div>
    `).join('');
  }

  // ─── Catch ────────────────────────────────────────────────────────────────
  function refreshSelects() {
    const sa = document.getElementById('sel-angler');
    const ss = document.getElementById('sel-species');
    const prevA = sa.value, prevS = ss.value;

    sa.innerHTML = '<option value="">— Angler wählen —</option>' +
      state.participants.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
    ss.innerHTML = '<option value="">— Fischart wählen —</option>' +
      state.species.map(s => `<option value="${s.id}">${s.name}</option>`).join('');

    if (prevA) sa.value = prevA;
    if (prevS) ss.value = prevS;
  }

  function addCatch() {
    const angId = document.getElementById('sel-angler').value;
    const spId = document.getElementById('sel-species').value;
    const len = parseFloat(document.getElementById('inp-length').value);

    if (!angId) { toast('Bitte Angler wählen'); return; }
    if (!spId) { toast('Bitte Fischart wählen'); return; }
    if (!len || len <= 0) { toast('Bitte gültige Länge eintragen'); return; }

    state.catches.push({ id: uid(), participantId: angId, speciesId: spId, length: len, ts: Date.now() });
    document.getElementById('inp-length').value = '';
    renderCatchLog();
    saveState();
    toast('🐟 Fang eingetragen!');
  }

  function removeCatch(id) {
    state.catches = state.catches.filter(c => c.id !== id);
    renderCatchLog();
    renderRanking();
    saveState();
  }

  function renderCatchLog() {
    const el = document.getElementById('catch-log');
    const cnt = document.getElementById('catch-count');
    cnt.textContent = state.catches.length ? state.catches.length + ' Einträge' : '';

    if (!state.catches.length) {
      el.innerHTML = `<div class="empty-state"><div class="empty-icon">🎣</div><p>Noch keine Fänge eingetragen</p></div>`;
      return;
    }

    const sorted = [...state.catches].sort((a, b) => b.ts - a.ts);
    el.innerHTML = sorted.map(c => {
      const p = state.participants.find(x => x.id === c.participantId);
      const s = state.species.find(x => x.id === c.speciesId);
      if (!p || !s) return '';
      return `
        <div class="catch-item">
          <div class="ci-avatar" style="background:${p.color}22;color:${p.color};border:1.5px solid ${p.color}44">${initials(p.name)}</div>
          <div class="ci-info">
            <div class="ci-main">${p.name}</div>
            <div class="ci-sub"><span style="color:${s.color}">●</span> ${s.name}</div>
          </div>
          <div class="ci-length">${c.length} cm</div>
          <button class="btn btn-danger" onclick="removeCatch('${c.id}')">✕</button>
        </div>
      `;
    }).join('');
  }

  // ─── Ranking ──────────────────────────────────────────────────────────────
  function renderRanking() {
    const sc = document.getElementById('stat-chips');
    const totalFish = state.catches.length;
    const maxLen = totalFish ? Math.max(...state.catches.map(c => c.length)) : 0;
    sc.innerHTML = `
      <div class="stat-chip"><div class="val">${state.participants.length}</div><div class="lbl">Angler</div></div>
      <div class="stat-chip"><div class="val">${totalFish}</div><div class="lbl">Fänge</div></div>
      <div class="stat-chip"><div class="val">${maxLen > 0 ? maxLen + ' cm' : '—'}</div><div class="lbl">Längster Fisch</div></div>
      <div class="stat-chip"><div class="val">${state.species.length}</div><div class="lbl">Fischarten</div></div>
    `;

    const el = document.getElementById('ranking-content');
    if (!state.catches.length || !state.species.length) {
      el.innerHTML = `<div class="empty-state" style="padding:60px 20px;"><div class="empty-icon">🏆</div><p>Noch keine Daten für die Rangliste</p></div>`;
      return;
    }

    let html = '';
    const overallBest = {};

    state.species.forEach(sp => {
      const spCatches = state.catches.filter(c => c.speciesId === sp.id);
      if (!spCatches.length) return;

      const bestPerParticipant = {};
      spCatches.forEach(c => {
        const existing = bestPerParticipant[c.participantId];
        if (!existing || c.length > existing.length) {
          bestPerParticipant[c.participantId] = c;
        }
      });

      const rows = Object.values(bestPerParticipant)
        .map(c => ({
          pid: c.participantId,
          best: c.length
        }))
        .sort((a, b) => b.best - a.best);

      rows.forEach(r => {
        if (!overallBest[r.pid]) overallBest[r.pid] = { total: 0, count: 0 };
        overallBest[r.pid].total += r.best;
        overallBest[r.pid].count += 1;
      });

      const rankClasses = ['rank-1', 'rank-2', 'rank-3'];

      html += `
        <div class="ranking-section">
          <div class="ranking-header">
            <div class="species-badge">
              <div class="species-dot" style="background:${sp.color}"></div>
              ${sp.name}
            </div>
            <span style="color:var(--muted);font-size:13px">${rows.length} gewertet</span>
          </div>
          <div class="card" style="padding:0;overflow:hidden;">
            <table class="ranking-table">
              <thead>
                <tr>
                  <th style="width:56px">Platz</th>
                  <th>Angler</th>
                  <th>Wertung</th>
                  <th>Größter Fisch</th>
                </tr>
              </thead>
              <tbody>
                ${rows.map((r, i) => {
                  const p = state.participants.find(x => x.id === r.pid);
                  if (!p) return '';
                  const rankClass = i < 3 ? rankClasses[i] : 'rank-other';
                  const isFirst = i === 0;
                  return `
                    <tr>
                      <td><div class="rank-pos ${rankClass}">${i + 1}</div></td>
                      <td>
                        <div class="angler-row">
                          <div class="mini-avatar" style="background:${p.color}22;color:${p.color};border:1.5px solid ${p.color}44">${initials(p.name)}</div>
                          <span style="font-weight:600;${isFirst ? 'color:var(--gold-light)' : ''}">${p.name}</span>
                          ${isFirst ? '<span style="font-size:16px;margin-left:4px">🏆</span>' : ''}
                        </div>
                      </td>
                      <td style="color:var(--muted)">nur bester Fang</td>
                      <td>
                        <div class="length-display" style="color:${isFirst ? 'var(--gold)' : 'var(--accent)'}">${r.best.toFixed(1)} cm</div>
                      </td>
                    </tr>
                  `;
                }).join('')}
              </tbody>
            </table>
          </div>
        </div>
      `;
    });

    if (state.species.length > 1 && Object.keys(overallBest).length) {
      const overallRows = Object.entries(overallBest)
        .map(([pid, data]) => ({ pid, ...data }))
        .sort((a, b) => b.total - a.total);

      const rankClasses = ['rank-1', 'rank-2', 'rank-3'];

      html += `
        <div class="ranking-section">
          <div class="ranking-header">
            <div class="species-badge">🏅 Gesamtwertung</div>
            <span style="color:var(--muted);font-size:13px">pro Fischart zählt nur der größte Fisch</span>
          </div>
          <div class="card" style="padding:0;overflow:hidden;">
            <table class="ranking-table">
              <thead>
                <tr>
                  <th style="width:56px">Platz</th>
                  <th>Angler</th>
                  <th>Gewertete Arten</th>
                  <th>Gesamtlänge</th>
                </tr>
              </thead>
              <tbody>
                ${overallRows.map((r, i) => {
                  const p = state.participants.find(x => x.id === r.pid);
                  if (!p) return '';
                  const rankClass = i < 3 ? rankClasses[i] : 'rank-other';
                  return `
                    <tr>
                      <td><div class="rank-pos ${rankClass}">${i + 1}</div></td>
                      <td>
                        <div class="angler-row">
                          <div class="mini-avatar" style="background:${p.color}22;color:${p.color};border:1.5px solid ${p.color}44">${initials(p.name)}</div>
                          <span style="font-weight:600;${i === 0 ? 'color:var(--gold-light)' : ''}">${p.name}</span>
                          ${i === 0 ? '<span style="font-size:16px;margin-left:4px">👑</span>' : ''}
                        </div>
                      </td>
                      <td style="color:var(--muted)">${r.count}</td>
                      <td>
                        <div class="length-display" style="color:${i === 0 ? 'var(--gold)' : 'var(--accent)'}">${r.total.toFixed(1)} cm</div>
                      </td>
                    </tr>
                  `;
                }).join('')}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    el.innerHTML = html || `<div class="empty-state" style="padding:40px;"><div class="empty-icon">🐟</div><p>Keine Fänge für verfügbare Fischarten</p></div>`;
  }

  loadState();
  renderAll();

  // ─── Enter key support ────────────────────────────────────────────────────
  document.getElementById('inp-name').addEventListener('keydown', e => { if (e.key === 'Enter') addParticipant(); });
  document.getElementById('inp-species').addEventListener('keydown', e => { if (e.key === 'Enter') addSpecies(); });
  document.getElementById('inp-length').addEventListener('keydown', e => { if (e.key === 'Enter') addCatch(); });
</script>

</body>
</html>
